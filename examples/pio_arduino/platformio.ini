; PlatformIO example: same demo as examples/print_demo, Arduino framework.
; The library is pulled from the repo root via symlink for local development;
; out-of-tree users would use:
;   lib_deps = https://github.com/jh247247/esp32-brother-ptouch.git
[env:esp32s3_arduino]
platform = espressif32
board = esp32-s3-devkitc-1
framework = arduino
monitor_speed = 115200
lib_deps = symlink://../..
