version: "0.1.0"
description: "Brother P-touch label printer driver for ESP32 USB-OTG host (raster protocol + USB transport + print API). Verified on PT-P710BT."
url: "https://github.com/jh247247/esp32-brother-ptouch"
repository: "https://github.com/jh247247/esp32-brother-ptouch.git"
license: "Apache-2.0"
tags:
  - brother
  - ptouch
  - label-printer
  - usb-host
targets:
  - esp32s2
  - esp32s3
  - esp32p4
dependencies:
  idf: ">=5.0"
  # The USB Host Library moved out of core components in ESP-IDF 6.
  espressif/usb:
    version: "^1.0.0"
    rules:
      - if: "idf_version >=6.0"
